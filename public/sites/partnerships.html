<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- ── SEO Meta Tags ── -->
        <meta name="description" content="Descubre nuestras alianzas académicas con universidades reconocidas y nuestra red de colaboración educativa." />

        <!-- ── SEO Bilingüe: hreflang (US35) ── -->
        <!--
        Estas etiquetas le dicen a Google qué versión de idioma mostrar según la región.
        Cuando el usuario esté en español, el <head> se estructura así:
        lang="es" + hreflang="es/en/x-default" apuntando a la misma URL
        (una SPA no tiene rutas distintas, así que href apunta al mismo index.html)
        -->
        <link rel="alternate" hreflang="es" href="partnerships.html" />
        <link rel="alternate" hreflang="en" href="partnerships.html" />
        <link rel="alternate" hreflang="x-default" href="partnerships.html" />

        <link rel="stylesheet" href="../assets/styles/partnerships_stylesheet.css" />
        <link rel="icon" href="favicon.ico" type="image/x-icon" />
        <title>SkillSwap | La Red Interuniversitaria Más Grande del Perú</title>
    </head>
    <body>

        <!-- ═══════════════════════════════════════ NAV ═══════════════════════════════════════ -->
        <nav class="barra-navegacion">

        <!-- Botón menú hamburguesa -->
        <div class="menu-hamburguesa" id="btn-menu" aria-label="Abrir menú" role="button" tabindex="0">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <!-- Logo -->
        <div class="logo">
            <a href="../index.html">
            <img src="../assets/images/SkillSwap_logo.png" alt="Logo SkillSwap" />
            </a>
        </div>

        <!-- Menú principal -->
        <div class="menu-horizontal">
            <ul class="menu-horizontal-opciones">

            <li><a href="partnerships.html"   data-i18n="nav-alianzas">Alianzas</a></li>
            <li><a href="proyects.html"  data-i18n="nav-proyectos">Proyectos</a></li>
            <li><a href="aboutUs.html" data-i18n="nav-sobre-nosotros">Sobre nosotros</a></li>

            <li>
                <a href="login.html">
                <button class="btn-iniciarsesion" data-i18n="nav-login">Iniciar Sesión</button>
                </a>
            </li>
            <li>
                <a href="signup.html">
                <button class="btn-registrase" data-i18n="nav-register">Registrarse</button>
                </a>
            </li>

            <!-- ── Selector de Idioma (US35) ── -->
            <li class="lang-switcher-item">
                <div class="lang-switcher" role="group" aria-label="Seleccionar idioma">
                <button class="lang-btn active" data-lang="es" onclick="applyLanguage('es')" aria-label="Español">ES</button>
                <span class="lang-divider">|</span>
                <button class="lang-btn"        data-lang="en" onclick="applyLanguage('en')" aria-label="English">EN</button>
                </div>
            </li>

            </ul>
        </div>
        </nav>
    </body>
</html>
