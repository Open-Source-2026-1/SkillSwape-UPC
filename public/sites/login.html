<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    
    <link rel="alternate" hreflang="es" href="login.html" />
    <link rel="alternate" hreflang="en" href="login.html" />
    <link rel="alternate" hreflang="x-default" href="login.html" />

    <link rel="stylesheet" href="../assets/styles/login_stylesheet.css"/>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <title>SkillSwap | La Red Interuniversitaria Más Grande del Perú</title>
  </head>
  <body>
    <nav class="top-header">
      <a href="../index.html" class="nav-logo">
        <img height="60" width="" src="../assets/images/SkillSwap_logo.png" alt="Logo SkillSwap" />
      </a>
      
      <button class="hamburger" id="hamburger" aria-label="Abrir menú">
        &#9776;
      </button>
      
      <a href="alianzas.html" class="nav-link" data-i18n="nav-alianzas">Alianzas</a>
      <a href="proyects.html" class="nav-link" data-i18n="nav-proyectos">Proyectos</a>
      <a href="aboutUs.html" class="nav-link" data-i18n="nav-sobre-nosotros">Sobre nosotros</a>
      
      <div class="divider"></div>
      
      <a href="login.html" class="btn-login" data-i18n="nav-login">Iniciar Sesión</a>
      <a href="register.html" class="btn-register" data-i18n="nav-register">Registrarse</a>

      <div class="lang-switcher" role="group" aria-label="Seleccionar idioma">
        <button class="lang-btn active" data-lang="es" onclick="applyLanguage('es')" aria-label="Español">ES</button>
        <span class="lang-divider">|</span>
        <button class="lang-btn" data-lang="en" onclick="applyLanguage('en')" aria-label="English">EN</button>
      </div>
    </nav>

    <section class="login-container">
      <div class="login-box">
        <img height="300px" width="" src="../assets/images/estudiosos.jpg" alt="Estudiosos" />
        
        <h2 data-i18n="login-title">SkillSwap</h2>

        <form onsubmit="return validarLogin(event);">
          <div class="input-group">
            <label for="email" data-i18n="email-label">*</label>
            <input
              type="email"
              id="email"
              name="email"
              data-i18n="email-placeholder"
              placeholder="Ej: admin, u20201234@upc.edu.pe"
              required
            />
          </div>

          <div class="input-group">
            <label for="password" data-i18n="password-label">*</label>
            <input
              type="password"
              id="password"
              name="password"
              data-i18n="password-placeholder"
              placeholder="Introduce tu contraseña"
              required
            />
          </div>

          <button type="submit" class="login-button" data-i18n="login-btn">Iniciar Sesión</button>
          
          <label>
            <span data-i18n="signup-label">¿No tienes una cuenta?</span> 
            <a href="register.html" data-i18n="signup-text">Regístrate</a>
          </label>
        </form>
      </div>
    </section>
  </body>
</html>
